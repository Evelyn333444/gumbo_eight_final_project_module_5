<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Sorting Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Movie Finder</h1>
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Search for a movie...">
            <button type="submit">Search</button>
        </form>
    </header>
    <main id="movie-container">
        <!-- Movie cards will be dynamically inserted here -->
    </main>
    <select id="filter" onchange="filtermovie.Year()">
            <option value="" disabled selected> Sort </option>
            <option value="OLD_TO_NEW"> Release year, old to new</option>
            <option value="NEW_TO_OLD">Release year, new to old</option>
            </select>   
    <script src="index.js"></script>
</body>
 <footer>
    <p class="copyright">&copy; 2026 FES Movie App. All Rights Reserved.</p>
  </footer>
</html>
